# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: uploadexcel
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: S423_Practice_Destination
          url: http://s4h2023.sapdemo.com:8080
        app:
          name: ZEXCELFORMATTER
          description: An SAP Fiori application.
          package: $TMP
          transport: ''
        exclude:
          - /test/
